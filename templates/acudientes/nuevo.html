{% extends "base.html" %}

{% block contenido %}

{% include "components/volver_paciente.html" %}

<h2>

Nuevo Acudiente

</h2>

<form method="post" action="/acudientes/guardar">

<input
type="hidden"
name="paciente_id"
value="{{ paciente_id }}">

<div class="card shadow">

<div class="card-body">

<div class="row g-3">

<div class="col-md-6">

<label>Nombre Completo</label>

<input
type="text"
name="nombre"
class="form-control"
required>

</div>

<div class="col-md-3">

<label>Parentesco</label>

<input
type="text"
name="parentesco"
class="form-control">

</div>

<div class="col-md-3">

<label>Teléfono</label>

<input
type="text"
name="telefono_principal"
class="form-control">

</div>

<div class="col-md-6">

<label>Correo</label>

<input
type="email"
name="correo"
class="form-control">

</div>

<div class="col-md-6">

<label>Dirección</label>

<input
type="text"
name="direccion"
class="form-control">

</div>

<div class="col-md-12">

<label>Observaciones</label>

<textarea
name="observaciones"
class="form-control"
rows="4"></textarea>

</div>

</div>

<hr>

<button class="btn btn-success">

Guardar

</button>

<a
href="/acudientes/{{ paciente_id }}"
class="btn btn-secondary">

Cancelar

</a>

</div>

</div>

</form>

{% endblock %}
