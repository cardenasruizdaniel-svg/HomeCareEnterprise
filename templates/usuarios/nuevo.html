{% extends "base.html" %}

{% block contenido %}

<div class="container-fluid">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h3>
                <i class="fa-solid fa-user-plus"></i>
                Nuevo Usuario
            </h3>

        </div>

        <div class="card-body">

            <form method="post" action="/usuarios/guardar">

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label>Nombre completo</label>

                        <input
                            type="text"
                            name="nombre"
                            class="form-control"
                            required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>Usuario</label>

                        <input
                            type="text"
                            name="usuario"
                            class="form-control"
                            required>

                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label>Contraseña</label>

                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>Rol</label>

                        <select
                            name="rol"
                            class="form-select">

                            {% for r in roles %}
                            <option value="{{ r }}">{{ r }}</option>
                            {% endfor %}

                        </select>

                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label>Correo</label>

                        <input
                            type="email"
                            name="correo"
                            class="form-control">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>Teléfono</label>

                        <input
                            type="text"
                            name="telefono"
                            class="form-control">

                    </div>

                </div>

                <hr>

                <button class="btn btn-success">

                    <i class="fa-solid fa-floppy-disk"></i>

                    Guardar Usuario

                </button>

                <a
                    href="/usuarios"
                    class="btn btn-secondary">

                    Cancelar

                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
