<div class="topbar">

    <button id="btn-alternar-sidebar" title="Ocultar / mostrar el menú">
        <i class="fa-solid fa-bars"></i>
    </button>

    <div class="topbar-left">
        <strong>HomeCare del Quindío I.P.S.</strong>
    </div>

    <div class="d-flex align-items-center gap-3">

        {% if usuario %}
        <span class="text-secondary">
            <i class="fa-solid fa-user-circle"></i>
            {{ usuario.nombre }}
            <span class="badge bg-secondary">{{ usuario.rol }}</span>
        </span>
        <a href="/logout" class="btn btn-sm btn-outline-danger">
            <i class="fa-solid fa-right-from-bracket"></i> Salir
        </a>
        {% endif %}

    </div>

</div>

<script>
(function () {
    const PREFERENCIA = "homecare_sidebar_oculta";

    if (localStorage.getItem(PREFERENCIA) === "1") {
        document.body.classList.add("sidebar-oculta");
    }

    document.getElementById("btn-alternar-sidebar").addEventListener("click", () => {
        document.body.classList.toggle("sidebar-oculta");
        localStorage.setItem(PREFERENCIA, document.body.classList.contains("sidebar-oculta") ? "1" : "0");
    });
})();
</script>
