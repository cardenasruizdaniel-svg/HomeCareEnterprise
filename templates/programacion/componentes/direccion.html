<div class="card shadow-sm border-0 mb-4">

    <div class="card-header bg-light">
        <h5 class="mb-0">
            <i class="fa-solid fa-location-dot text-primary"></i>
            Lugar de Atención
        </h5>
    </div>

    <div class="card-body">
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Dirección</label>
                <input type="text" class="form-control" name="direccion" id="direccion_visita">
            </div>
            <div class="col-md-3 mb-3">
                <label class="form-label">Barrio</label>
                <input type="text" class="form-control" name="barrio">
            </div>
            <div class="col-md-3 mb-3">
                <label class="form-label">Ciudad</label>
                <input type="text" class="form-control" name="ciudad" id="ciudad_visita">
            </div>
        </div>
        <div class="row">
            <div class="col-md-4 mb-3">
                <label class="form-label">Departamento</label>
                <input type="text" class="form-control" name="departamento">
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label">Teléfono de contacto</label>
                <input type="text" class="form-control" name="telefono_contacto">
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label">Nombre de quien recibe</label>
                <input type="text" class="form-control" name="nombre_contacto">
            </div>
        </div>
    </div>

</div>
