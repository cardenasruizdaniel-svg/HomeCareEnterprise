{% extends "base.html" %}

{% block contenido %}

<h2>📅 Calendario de Visitas HomeCare</h2>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

<div id="calendar"></div>

<script>

document.addEventListener('DOMContentLoaded', function() {

    var calendar = new FullCalendar.Calendar(
        document.getElementById('calendar'),
        {
            initialView: 'dayGridMonth',
            locale: 'es',
            editable: true,
            selectable: true,
            events: '/api/calendario',

            // 📌 CREAR EVENTO
            select: function(info) {

                let titulo = prompt("Nombre de la visita:");

                if (titulo) {

                    fetch('/crear_evento', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            titulo: titulo,
                            start: info.startStr,
                            end: info.endStr
                        })
                    }).then(() => {
                        calendar.refetchEvents();
                    });

                }

            },

            // 📌 EDITAR EVENTO
            eventDrop: function(info) {

                fetch('/actualizar_evento', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        id: info.event.id,
                        start: info.event.start,
                        end: info.event.end
                    })
                });

            },

            // 📌 CLICK EVENTO
            eventClick: function(info) {

                let nuevo = prompt("Editar título:", info.event.title);

                if (nuevo) {

                    fetch('/editar_titulo', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            id: info.event.id,
                            titulo: nuevo
                        })
                    }).then(() => {
                        calendar.refetchEvents();
                    });

                }

            }

        }
    );

    calendar.render();

});

</script>
});

</script>

<style>
#calendar {
    max-width: 1100px;
    margin: 40px auto;
    background: white;
    padding: 10px;
    border-radius: 10px;
}
</style>

{% endblock %}
