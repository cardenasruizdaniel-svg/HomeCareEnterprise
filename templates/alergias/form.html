{% extends "base.html" %}

{% block contenido %}

<div class="container-fluid">


{% include "components/volver_paciente.html" %}

    <div class="card shadow">
        <div class="card-header {% if alergia %}bg-warning{% else %}bg-primary text-white{% endif %}">
            <h3 class="mb-0">
                <i class="fa-solid fa-triangle-exclamation"></i>
                {% if alergia %}Editar Alergia{% else %}Nueva Alergia{% endif %}
            </h3>
        </div>
        <div class="card-body">

            {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
            {% endif %}

            <form method="post" action="{% if alergia %}/alergias/editar/{{ alergia.id }}{% else %}/alergias/guardar{% endif %}">

                <input type="hidden" name="paciente_id" value="{{ paciente_id }}">

                <div class="row">
                    <div class="col-md-3 mb-3">
                        <label>Tipo</label>
                        <select name="tipo" class="form-select" required>
                            {% for t in tipos %}
                            <option value="{{ t }}" {% if alergia and alergia.tipo==t %}selected{% endif %}>{{ t }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-5 mb-3">
                        <label>Alérgeno</label>
                        <input type="text" name="alergeno" class="form-control" value="{{ alergia.alergeno if alergia else '' }}" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label>Severidad</label>
                        <select name="severidad" class="form-select" required>
                            {% for s in severidades %}
                            <option value="{{ s }}" {% if alergia and alergia.severidad==s %}selected{% endif %}>{{ s }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label>Estado</label>
                        <select name="estado" class="form-select" required>
                            {% for e in estados %}
                            <option value="{{ e }}" {% if alergia and alergia.estado==e %}selected{% endif %}>{{ e }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label>Fecha de diagnóstico</label>
                        <input type="date" name="fecha_diagnostico" class="form-control" value="{{ alergia.fecha_diagnostico if alergia else '' }}">
                    </div>
                </div>

                <div class="mb-3">
                    <label>Reacción</label>
                    <input type="text" name="reaccion" class="form-control" value="{{ alergia.reaccion if alergia else '' }}">
                </div>

                <div class="mb-3">
                    <label>Observaciones</label>
                    <textarea name="observaciones" class="form-control" rows="2">{{ alergia.observaciones if alergia else '' }}</textarea>
                </div>

                <hr>

                <button class="btn btn-success">
                    <i class="fa-solid fa-floppy-disk"></i> Guardar
                </button>
                <a href="/alergias/{{ paciente_id }}" class="btn btn-secondary">Cancelar</a>

            </form>
        </div>
    </div>

</div>

{% endblock %}
