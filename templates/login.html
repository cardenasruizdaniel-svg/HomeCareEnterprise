<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>HomeCare del Quindío I.P.S.</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

    <style>

        :root{
            --hc-magenta:#e6006e;
            --hc-teal:#00a19b;
            --hc-verde:#8bbd00;
        }

        body{
            background: linear-gradient(160deg, #ffffff 0%, #f2fbfa 45%, #fdf1f7 100%);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:"Segoe UI",sans-serif;
        }

        .login-card{
            width:430px;
            border:none;
            border-radius:22px;
            box-shadow:0 15px 40px rgba(230,0,110,.15);
            overflow:hidden;
        }

        .login-card::before{
            content:"";
            display:block;
            height:8px;
            background:linear-gradient(90deg, var(--hc-magenta), var(--hc-teal), var(--hc-verde));
        }

        .logo-img{
            width:110px;
            height:110px;
            margin-bottom:10px;
        }

        .marca-home{ color:var(--hc-teal); font-weight:800; }
        .marca-care{ color:var(--hc-magenta); font-weight:800; }
        .marca-sede{ color:var(--hc-verde); font-weight:700; font-size:15px; }
        .marca-slogan{ color:var(--hc-teal); font-size:13px; }

        .form-control:focus{
            border-color: var(--hc-teal);
            box-shadow:0 0 0 .2rem rgba(0,161,155,.20);
        }

        .btn-marca{
            background: linear-gradient(90deg, var(--hc-magenta), #c8005f);
            color:white;
            border:none;
            font-weight:600;
        }
        .btn-marca:hover{
            background: linear-gradient(90deg, #c8005f, var(--hc-magenta));
            color:white;
        }

    </style>

</head>

<body>

<div class="card login-card">

    <div class="card-body p-5 pt-4">

        <div class="text-center mb-4">

            <img src="/static/img/logo_homecare.png" alt="HomeCare del Quindío I.P.S." class="logo-img">

            <h2 class="mt-2 mb-0">
                <span class="marca-home">Home</span><span class="marca-care">Care</span>
            </h2>

            <div class="marca-sede">del Quindío I.P.S.</div>

            <div class="marca-slogan mt-1">Bienestar en casa.</div>

        </div>

        {% if error %}

        <div class="alert alert-danger">

            {{ error }}

        </div>

        {% endif %}

        <form method="post" action="/login">

            <div class="mb-3">

                <label>Usuario</label>

                <input

                    type="text"

                    class="form-control"

                    name="usuario"

                    required>

            </div>

            <div class="mb-4">

                <label>Contraseña</label>

                <input

                    type="password"

                    class="form-control"

                    name="password"

                    required>

            </div>

            <button class="btn btn-marca w-100">

                <i class="fa-solid fa-right-to-bracket"></i>

                Ingresar

            </button>

        </form>

        <hr>

        <div class="text-center text-secondary" style="font-size:13px">

            HomeCare del Quindío I.P.S. © 2026

        </div>

    </div>

</div>

</body>

</html>
