<div class="row g-3">

    <div class="col-12">

        <div class="alert alert-secondary">

            <i class="fa-solid fa-users"></i>

            <strong>Información del Acudiente o Responsable</strong>

            <br>

            Registre la persona responsable del paciente para contacto en caso de emergencia o coordinación de visitas.

        </div>

    </div>

    <div class="col-md-6">

        <label class="form-label">

            Nombre Completo

        </label>

        <input
            type="text"
            name="contacto_emergencia"
            class="form-control"
            placeholder="Nombre del acudiente">

    </div>

    <div class="col-md-3">

        <label class="form-label">

            Parentesco

        </label>

        <select
            name="parentesco"
            class="form-select">

            <option value="">Seleccione...</option>

            <option>Padre</option>

            <option>Madre</option>

            <option>Hijo(a)</option>

            <option>Hermano(a)</option>

            <option>Esposo(a)</option>

            <option>Nieto(a)</option>

            <option>Tío(a)</option>

            <option>Primo(a)</option>

            <option>Vecino(a)</option>

            <option>Cuidador</option>

            <option>Otro</option>

        </select>

    </div>

    <div class="col-md-3">

        <label class="form-label">

            Celular

        </label>

        <input
            type="text"
            name="telefono_emergencia"
            class="form-control"
            placeholder="3001234567">

    </div>

    <div class="col-md-6">

        <label class="form-label">

            Teléfono Alterno

        </label>

        <input
            type="text"
            name="telefono_acudiente"
            class="form-control">

    </div>

    <div class="col-md-6">

        <label class="form-label">

            Correo Electrónico

        </label>

        <input
            type="email"
            name="correo_acudiente"
            class="form-control">

    </div>

    <div class="col-md-12">

        <label class="form-label">

            Dirección del Acudiente

        </label>

        <input
            type="text"
            name="direccion_acudiente"
            class="form-control">

    </div>

    <div class="col-md-12">

        <label class="form-label">

            Observaciones

        </label>

        <textarea
            name="observaciones_acudiente"
            class="form-control"
            rows="4"
            placeholder="Información adicional del acudiente..."></textarea>

    </div>

</div>
