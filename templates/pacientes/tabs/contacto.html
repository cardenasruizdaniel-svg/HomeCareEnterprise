<div class="row g-3">

    <div class="col-md-4">

        <label class="form-label">

            Celular

        </label>

        <input
            type="text"
            name="celular"
            class="form-control"
            maxlength="10"
            placeholder="3001234567">

    </div>

    <div class="col-md-4">

        <label class="form-label">

            Teléfono Fijo

        </label>

        <input
            type="text"
            name="telefono"
            class="form-control"
            placeholder="6067350000">

    </div>

    <div class="col-md-4">

        <label class="form-label">

            Correo Electrónico

        </label>

        <input
            type="email"
            name="correo"
            class="form-control"
            placeholder="correo@dominio.com">

    </div>

    <div class="col-md-8">

        <label class="form-label">

            Dirección

        </label>

        <input
            type="text"
            name="direccion"
            class="form-control"
            placeholder="Cra 15 # 20 - 35">

    </div>

    <div class="col-md-4">

        <label class="form-label">

            Barrio

        </label>

        <input
            type="text"
            name="barrio"
            class="form-control">

    </div>

    <div class="col-md-4">

        <label class="form-label">

            Departamento

        </label>

        <select
            class="form-select"
            id="departamento"
            name="departamento">

            <option value="">Seleccione...</option>

            <option>Amazonas</option>
            <option>Antioquia</option>
            <option>Arauca</option>
            <option>Atlántico</option>
            <option>Bolívar</option>
            <option>Boyacá</option>
            <option>Caldas</option>
            <option>Caquetá</option>
            <option>Casanare</option>
            <option>Cauca</option>
            <option>Cesar</option>
            <option>Chocó</option>
            <option>Córdoba</option>
            <option>Cundinamarca</option>
            <option>Guainía</option>
            <option>Guaviare</option>
            <option>Huila</option>
            <option>La Guajira</option>
            <option>Magdalena</option>
            <option>Meta</option>
            <option>Nariño</option>
            <option>Norte de Santander</option>
            <option>Putumayo</option>
            <option>Quindío</option>
            <option>Risaralda</option>
            <option>Santander</option>
            <option>Sucre</option>
            <option>Tolima</option>
            <option>Valle del Cauca</option>
            <option>Vaupés</option>
            <option>Vichada</option>

        </select>

    </div>

    <div class="col-md-4">

        <label class="form-label">

            Municipio

        </label>

        <input
            type="text"
            name="municipio"
            class="form-control"
            placeholder="Armenia">

    </div>

    <div class="col-md-4">

        <label class="form-label">

            Código Postal

        </label>

        <input
            type="text"
            name="codigo_postal"
            class="form-control">

    </div>

    <div class="col-md-12">

        <div class="alert alert-info">

            <i class="fa-solid fa-circle-info"></i>

            Esta información será utilizada para la programación de visitas domiciliarias y el cálculo automático de rutas.

        </div>

    </div>

</div>
