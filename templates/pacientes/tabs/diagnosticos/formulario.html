<div class="card shadow border-0 mt-4">

    <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">

        <h5 class="mb-0">

            <i class="fa-solid fa-plus-circle"></i>

            Nuevo Diagnóstico

        </h5>

        <button
            class="btn btn-light btn-sm"
            data-bs-toggle="collapse"
            data-bs-target="#panelNuevoDiagnostico">

            <i class="fa-solid fa-chevron-down"></i>

        </button>

    </div>

    <div id="panelNuevoDiagnostico" class="collapse show">

        <div class="card-body">

            <form method="post" action="/diagnosticos/guardar">

                <input
                    type="hidden"
                    name="paciente_id"
                    value="{{ paciente.id }}">

                <input
                    type="hidden"
                    name="usuario"
                    value="{{ session.nombre }}">

                <div class="row">

                    <div class="col-md-3 mb-3">

                        <label class="form-label">

                            Código CIE-10

                        </label>

                        <div class="input-group">

                            <input

                                type="text"

                                class="form-control"

                                id="codigo_cie10"

                                name="codigo_cie10"

                                required>

                            <button

                                type="button"

                                class="btn btn-outline-primary"

                                data-bs-toggle="modal"

                                data-bs-target="#modalBusquedaCIE10">

                                <i class="fa-solid fa-search"></i>

                            </button>

                        </div>

                    </div>

                    <div class="col-md-9 mb-3">

                        <label class="form-label">

                            Diagnóstico

                        </label>

                        <input

                            type="text"

                            class="form-control"

                            id="diagnostico"

                            name="diagnostico"

                            required>

                    </div>

                    <div class="col-md-3 mb-3">

                        <label class="form-label">

                            Tipo

                        </label>

                        <select
                            class="form-select"
                            name="tipo">

                            <option>

                                Principal

                            </option>

                            <option>

                                Secundario

                            </option>

                            <option>

                                Relacionado

                            </option>

                        </select>

                    </div>

                    <div class="col-md-3 mb-3">

                        <label class="form-label">

                            Fecha Diagnóstico

                        </label>

                        <input

                            type="date"

                            class="form-control"

                            name="fecha_diagnostico"

                            required>

                    </div>

                    <div class="col-md-3 mb-3">

                        <label class="form-label">

                            Profesional

                        </label>

                        <input

                            class="form-control"

                            name="profesional"

                            required>

                    </div>

                    <div class="col-md-3 mb-3">

                        <label class="form-label">

                            Especialidad

                        </label>

                        <input

                            class="form-control"

                            name="especialidad">

                    </div>

                    <div class="col-12 mb-3">

                        <label class="form-label">

                            Observaciones

                        </label>

                        <textarea

                            class="form-control"

                            rows="4"

                            name="observaciones"></textarea>

                    </div>

                </div>

                <div class="text-end">

                    <button
                        class="btn btn-success">

                        <i class="fa-solid fa-floppy-disk"></i>

                        Guardar Diagnóstico

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>
