<div class="card shadow border-0 mb-4">

    <div class="card-header bg-danger text-white">

        <h5 class="mb-0">

            <i class="fa-solid fa-heart-pulse"></i>

            Registro de Signos Vitales

        </h5>

    </div>

    <div class="card-body">

        <form action="/signos-vitales/guardar" method="post">

            <input type="hidden"
                   name="paciente_id"
                   value="{{ paciente.id }}">

            <input type="hidden"
                   name="usuario"
                   value="{{ session.usuario }}">

            <div class="row">

                <div class="col-md-3 mb-3">

                    <label class="form-label">

                        Fecha

                    </label>

                    <input
                        type="date"
                        class="form-control"
                        name="fecha"
                        required>

                </div>

                <div class="col-md-3 mb-3">

                    <label class="form-label">

                        Hora

                    </label>

                    <input
                        type="time"
                        class="form-control"
                        name="hora"
                        required>

                </div>

                <div class="col-md-6 mb-3">

                    <label class="form-label">

                        Profesional

                    </label>

                    <input
                        class="form-control"
                        name="profesional"
                        required>

                </div>

                <div class="col-md-3 mb-3">

                    <label>Temperatura °C</label>

                    <input
                        class="form-control"
                        type="number"
                        step="0.1"
                        name="temperatura">

                </div>

                <div class="col-md-3 mb-3">

                    <label>Presión Sistólica</label>

                    <input
                        class="form-control"
                        type="number"
                        name="presion_sistolica">

                </div>

                <div class="col-md-3 mb-3">

                    <label>Presión Diastólica</label>

                    <input
                        class="form-control"
                        type="number"
                        name="presion_diastolica">

                </div>

                <div class="col-md-3 mb-3">

                    <label>Frecuencia Cardíaca</label>

                    <input
                        class="form-control"
                        type="number"
                        name="frecuencia_cardiaca">

                </div>

                <div class="col-md-3 mb-3">

                    <label>Frecuencia Respiratoria</label>

                    <input
                        class="form-control"
                        type="number"
                        name="frecuencia_respiratoria">

                </div>

                <div class="col-md-3 mb-3">

                    <label>Saturación O₂ (%)</label>

                    <input
                        class="form-control"
                        type="number"
                        name="saturacion_oxigeno">

                </div>

                <div class="col-md-3 mb-3">

                    <label>Glucemia</label>

                    <input
                        class="form-control"
                        type="number"
                        step="0.1"
                        name="glucemia">

                </div>

                <div class="col-md-3 mb-3">

                    <label>Peso (kg)</label>

                    <input
                        class="form-control"
                        type="number"
                        step="0.1"
                        name="peso">

                </div>

                <div class="col-md-3 mb-3">

                    <label>Talla (m)</label>

                    <input
                        class="form-control"
                        type="number"
                        step="0.01"
                        name="talla">

                </div>

                <div class="col-md-3 mb-3">

                    <label>Dolor (EVA)</label>

                    <select
                        class="form-select"
                        name="dolor">

                        {% for i in range(11) %}
                            <option value="{{ i }}">{{ i }}</option>
                        {% endfor %}

                    </select>

                </div>

                <div class="col-md-12 mb-3">

                    <label>Observaciones</label>

                    <textarea
                        class="form-control"
                        rows="3"
                        name="observaciones"></textarea>

                </div>

            </div>

            <div class="text-end">

                <button class="btn btn-danger">

                    <i class="fa-solid fa-floppy-disk"></i>

                    Guardar Signos Vitales

                </button>

            </div>

        </form>

    </div>

</div>
